<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard PIM Indisponibilidades 2026 · v24</title>
<style>
:root {
  --blue:#118DFF;
  --navy:#12239E;
  --orange:#E66C37;
  --purple:#6B007B;
  --green:#107C10;
  --red:#D13438;
  --ink:#1f1f1f;
  --muted:#605E5C;
  --line:#E1DFDD;
  --line2:#D2D0CE;
  --paper:#FFFFFF;
  --soft:#F7F9FC;
  --bg:#EEF2F7;
  --shadow:0 10px 28px rgba(17,24,39,.10);
  --radius:18px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:linear-gradient(180deg,#eef4fb 0%,#f5f7fb 45%,#eef2f7 100%);font-family:'Segoe UI',Arial,sans-serif;color:var(--ink)}
.shell{max-width:1480px;margin:0 auto;padding:18px 20px 26px}
.top{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;margin-bottom:14px}
.title h1{font-size:24px;line-height:1.18;margin:0;font-weight:750;color:#18212f}
.title p{font-size:12.5px;color:var(--muted);margin:5px 0 0}
.controls{display:flex;gap:9px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
.select,.btn{height:36px;border:1px solid #C8C6C4;background:#fff;border-radius:10px;padding:0 12px;font-weight:650;color:#323130;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.btn{cursor:pointer}
.btn:hover,.select:hover{border-color:#8A8886;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.seg{height:36px;display:flex;border:1px solid #C8C6C4;background:#fff;border-radius:999px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.seg button{border:0;border-right:1px solid #E1DFDD;background:#fff;padding:0 14px;cursor:pointer;font-weight:700;color:#323130;white-space:nowrap}
.seg button:last-child{border-right:0}
.seg button.active{background:#EAF4FF;color:#0F6CBD}
.dashboard-card{background:rgba(255,255,255,.92);border:1px solid rgba(209,213,219,.9);box-shadow:var(--shadow);border-radius:var(--radius);padding:14px;overflow:hidden}
.status-line{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 4px 12px}
.status-line .crumb{display:flex;align-items:center;gap:9px;font-weight:750;color:#333}
.status-line .crumb .dot{width:11px;height:11px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 4px rgba(17,141,255,.14)}
.status-line .meta{font-size:12px;color:var(--muted);text-align:right}
.kpi-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:0 0 12px}
.kpi{background:linear-gradient(180deg,#fff,#fafafa);border:1px solid #E5E7EB;border-radius:14px;padding:10px 12px;min-height:70px;box-shadow:0 4px 14px rgba(17,24,39,.05)}
.kpi b{display:block;font-size:22px;line-height:1.05;color:#111827}
.kpi span{display:block;font-size:11.5px;color:#667085;margin-top:4px}
.kpi .chip{display:inline-flex;margin-top:6px;font-size:10.5px;border-radius:999px;padding:2px 7px;background:#F3F4F6;color:#475467}
.main-grid{display:grid;grid-template-columns:minmax(390px,1.2fr) minmax(300px,.85fr) minmax(360px,.95fr);grid-template-areas:
  "month month month"
  "origin origin estado"
  "unit central gauges"
  "unit origin-summary gauges"
  "chart chart chart";
  gap:12px;align-items:stretch;}
.card{background:#fff;border:1px solid #E3E6EA;border-radius:16px;box-shadow:0 5px 18px rgba(31,41,55,.06);overflow:hidden}
.card-head{height:39px;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 14px;border-bottom:1px solid #EDF0F3;background:linear-gradient(180deg,#fff,#fbfcfe)}
.card-head h2{font-size:13.5px;margin:0;font-weight:760;color:#2b2b2b}
.card-head small{font-size:11px;color:#667085;white-space:nowrap}
.slicer-card{padding-bottom:10px}
.slicer-origin{grid-area:origin}
.slicer-estado{grid-area:estado}
.slicer-month{grid-area:month}
.slicer-body{padding:10px 12px 0}
.pill-grid{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.month-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(82px,1fr));gap:8px;align-items:center}
.slice-btn.month{justify-content:center;min-height:38px;padding:6px 9px;font-size:11px;min-width:0;overflow:hidden;text-overflow:ellipsis}
.slice-btn{min-height:34px;border:1px solid #D0D5DD;background:#fff;color:#344054;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;border-radius:999px;padding:6px 11px;display:inline-flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 1px 2px rgba(16,24,40,.04);overflow:hidden;text-overflow:ellipsis}
.slice-btn .count{font-size:10.5px;line-height:1;border-radius:999px;padding:3px 6px;background:#F2F4F7;color:#667085}
.slice-btn:hover{border-color:#8A8886;transform:translateY(-1px)}
.slice-btn.active{background:#EAF4FF;border-color:#118DFF;color:#0F6CBD}
.slice-btn.active .count{background:#D8ECFF;color:#0F6CBD}
.matrix-unit{grid-area:unit;min-height:292px}
.matrix-central{grid-area:central;min-height:0;align-self:start}
.gauges-panel{grid-area:gauges;display:grid;grid-template-rows:1fr 1fr;gap:12px;min-height:292px}
.gauge-eq{min-height:138px}
.chart-card{grid-area:chart;min-height:392px}

.matrix-central .matrix-scroll{height:auto;max-height:205px}
.origin-summary{grid-area:origin-summary;min-height:0;align-self:start}
.summary-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:10px}
.summary-row{display:grid;grid-template-columns:92px 1fr 72px;gap:10px;align-items:center;font-size:12px;color:#344054}
.summary-row b{font-size:12px;font-weight:780;white-space:nowrap}
.summary-track{height:12px;background:#EEF2F6;border-radius:999px;overflow:hidden;border:1px solid #E4E7EC}
.summary-fill{height:100%;border-radius:999px;min-width:2px;box-shadow:inset 0 -1px 0 rgba(0,0,0,.12)}
.summary-val{text-align:right;font-weight:800;color:#111827;white-space:nowrap}
.summary-note{font-size:11px;color:#667085;margin-top:2px;line-height:1.35}
.matrix-scroll{height:calc(100% - 39px);max-height:334px;overflow:auto}
.matrix table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;line-height:1.2}
.matrix th{position:sticky;top:0;background:#fff;z-index:1;border-bottom:1px solid #D0D5DD;padding:8px 9px;text-align:right;color:#344054;font-weight:760;white-space:nowrap}
.matrix th:first-child,.matrix td:first-child{text-align:left}
.matrix td{border-bottom:1px solid #EEF2F6;padding:7px 9px;text-align:right;white-space:nowrap;color:#344054}
.matrix tbody tr:nth-child(even) td{background:#FBFCFE}
.matrix tbody tr:hover td{background:#EFF8FF}
.matrix tfoot td{position:sticky;bottom:0;background:#fff;border-top:1px solid #98A2B3;border-bottom:0;font-weight:800;color:#111827;padding:8px 9px;text-align:right}
.matrix tfoot td:first-child{text-align:left}
.gauge-wrap{height:calc(100% - 39px);min-height:224px;padding:6px 10px 10px;display:flex;align-items:center;justify-content:center}
.gauge-eq .gauge-wrap{min-height:98px;padding:4px 10px 8px}
.gauge svg{width:100%;height:100%;max-height:250px;overflow:visible}
.gauge-eq svg{max-height:138px}
.gauge .g-num{font-size:28px;font-weight:760;fill:#101828}
.gauge-eq .g-num{font-size:24px}
.gauge .g-small{font-size:11px;fill:#667085}
.gauge .g-caption{font-size:12px;fill:#667085}
.gauge .g-tick{stroke:#98A2B3;stroke-width:1.7;stroke-linecap:round}
.gauge .g-tick-label{font-size:10px;fill:#667085;font-weight:700}
.gauge .g-track{stroke:#E9EDF3;stroke-width:20;fill:none;stroke-linecap:round}
.gauge .g-fill{stroke:#78BE20;stroke-width:20;fill:none;stroke-linecap:round}
.gauge .g-needle-dot{fill:#78BE20;stroke:#fff;stroke-width:2}
.gauge .g-scale-dot{fill:#D0D5DD}
.gauge .g-scale-dot.active{fill:#78BE20}
.gauge .g-center-sub{font-size:10.5px;fill:#98A2B3;font-weight:700}
.chart-inner{padding:10px 14px 12px}
.chart-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:4px}
.chart-note{font-size:11.5px;color:#667085;margin:0;line-height:1.35}
.legend{display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:11.5px;color:#475467;justify-content:flex-end;min-width:300px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:10px;height:10px;border-radius:50%;display:inline-block;box-shadow:0 0 0 3px rgba(0,0,0,.03)}
.chart svg{width:100%;height:320px;display:block;overflow:visible}
.axis-label{font-size:10.5px;fill:#667085}
.tick-label{font-size:10px;fill:#667085}
.data-label{font-size:9.5px;fill:#344054;font-weight:800;paint-order:stroke;stroke:#fff;stroke-width:3px;stroke-linejoin:round;dominant-baseline:middle}
.bar{transition:opacity .18s ease, transform .18s ease;transform-box:fill-box;transform-origin:center bottom}
.bar:hover{opacity:.82;transform:scaleY(1.03)}
.detail{margin-top:14px;background:#fff;border:1px solid #D2D0CE;box-shadow:var(--shadow);border-radius:16px;overflow:hidden}
.detail summary{cursor:pointer;padding:12px 16px;font-weight:750;background:#fff}
.detail-inner{padding:0 14px 14px}
.table-wrap{max-height:380px;overflow:auto;border:1px solid #E1DFDD;border-radius:12px}
table.detail-table{border-collapse:collapse;width:100%;min-width:1150px;font-size:12px}
.detail-table th,.detail-table td{border-bottom:1px solid #EDEBE9;padding:7px 8px;vertical-align:top}
.detail-table th{position:sticky;top:0;background:#F9FAFB;text-align:left;z-index:1}
.audit{font-size:11px;color:#667085;text-align:right;margin-top:10px}
.title-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px}
.title-copy{flex:1;min-width:260px}
.title-copy p{max-width:820px}
.brand-hero{display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,#ffffff,#f8fbff);border:1px solid #DDE4EC;border-radius:16px;padding:10px 12px;min-width:220px;max-width:300px;box-shadow:0 8px 18px rgba(17,24,39,.06);overflow:hidden}
.brand-hero img{display:block;width:auto;height:auto;max-width:126px;max-height:38px;object-fit:contain;flex:0 0 auto}
.brand-hero[data-brand="ESSA"] img{max-width:126px;max-height:38px}
.brand-hero[data-brand="CHEC"] img{max-width:126px;max-height:38px}
.brand-meta{display:flex;flex-direction:column;gap:3px;min-width:0}
.brand-meta b{font-size:14px;color:#111827;line-height:1.1}
.brand-meta span{font-size:11.5px;color:#667085;line-height:1.2}
.kpi .kpi-top{display:flex;align-items:center;justify-content:space-between;gap:10px}.kpi .kpi-top>div{display:flex;flex-direction:column;justify-content:center;gap:2px}
.kpi-icon,.head-icon{--bg1:#eff6ff;--bg2:#dbeafe;--ink:#0F6CBD;--stroke:rgba(17,141,255,.16)}
.kpi-icon{width:28px;height:28px;border-radius:9px;display:inline-grid;place-items:center;align-content:center;justify-content:center;flex:0 0 auto;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--ink);box-shadow:inset 0 0 0 1px var(--stroke);overflow:hidden;line-height:0;text-align:center;padding:0}
.kpi-icon svg{width:16px;height:16px;display:block;overflow:visible;margin:auto;vertical-align:middle;transform-box:fill-box;transform-origin:center center}
.kpi-icon svg *{stroke:currentColor !important;fill:none !important;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.card-head h2{display:flex;align-items:center;gap:8px;min-width:0}
.head-icon{width:28px;height:28px;border-radius:9px;display:inline-grid;place-items:center;align-content:center;justify-content:center;flex:0 0 auto;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--ink);border:1px solid var(--stroke);overflow:hidden;line-height:0;text-align:center;padding:0}
.head-icon svg{width:16px;height:16px;display:block;overflow:visible;margin:auto;vertical-align:middle;transform-box:fill-box;transform-origin:center center}
.head-icon svg *{stroke:currentColor !important;fill:none !important;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.head-icon[data-kind="plan"],.kpi-icon[data-kind="plan"]{--bg1:#ecfdf3;--bg2:#d1fadf;--ink:#067647;--stroke:rgba(6,118,71,.18)}
.head-icon[data-kind="ejecucion"],.kpi-icon[data-kind="ejecucion"]{--bg1:#ecfdf3;--bg2:#abefc6;--ink:#027a48;--stroke:rgba(2,122,72,.18)}
.head-icon[data-kind="ratio"],.kpi-icon[data-kind="ratio"]{--bg1:#f4f3ff;--bg2:#e9d7fe;--ink:#7a3cff;--stroke:rgba(122,60,255,.18)}
.head-icon[data-kind="compare"],.kpi-icon[data-kind="compare"]{--bg1:#fff7ed;--bg2:#fed7aa;--ink:#c2410c;--stroke:rgba(194,65,12,.18)}
.head-icon[data-kind="fuera"],.kpi-icon[data-kind="fuera"]{--bg1:#fff1f2;--bg2:#fecdd3;--ink:#be123c;--stroke:rgba(190,18,60,.18)}
.head-icon[data-kind="extension"],.kpi-icon[data-kind="extension"]{--bg1:#fdf2fa;--bg2:#fbcfe8;--ink:#c11574;--stroke:rgba(193,21,116,.18)}
.head-icon[data-kind="total"],.kpi-icon[data-kind="total"]{--bg1:#eef2ff;--bg2:#c7d2fe;--ink:#4338ca;--stroke:rgba(67,56,202,.18)}
.head-icon[data-kind="matrix"],.kpi-icon[data-kind="matrix"]{--bg1:#ecfeff;--bg2:#cffafe;--ink:#0e7490;--stroke:rgba(14,116,144,.18)}
.head-icon[data-kind="summary"],.kpi-icon[data-kind="summary"]{--bg1:#ecfdf3;--bg2:#d1fae5;--ink:#047857;--stroke:rgba(4,120,87,.18)}
.head-icon[data-kind="chart"],.kpi-icon[data-kind="chart"]{--bg1:#eff6ff;--bg2:#bfdbfe;--ink:#1d4ed8;--stroke:rgba(29,78,216,.18)}
.head-icon[data-kind="month"],.kpi-icon[data-kind="month"]{--bg1:#f5f3ff;--bg2:#ddd6fe;--ink:#6d28d9;--stroke:rgba(109,40,217,.18)}
.head-icon[data-kind="filter"],.kpi-icon[data-kind="filter"]{--bg1:#f8fafc;--bg2:#e2e8f0;--ink:#475467;--stroke:rgba(71,84,103,.18)}
@media (max-width:1050px){.title-head{flex-direction:column;align-items:flex-start}.brand-hero{max-width:100%;width:100%}}

@media (max-width:1180px){
  .top{grid-template-columns:1fr}
  .controls{justify-content:flex-start}
  .main-grid{grid-template-columns:1fr;grid-template-areas:"month" "origin" "estado" "unit" "central" "origin-summary" "gauges" "chart"}
  .kpi-strip{grid-template-columns:repeat(3,1fr)}
  .matrix-scroll{max-height:280px}
  .gauges-panel{grid-template-columns:1fr 1fr;grid-template-rows:1fr;min-height:175px}
  .month-grid{grid-template-columns:repeat(auto-fit,minmax(88px,1fr))}
}
@media (max-width:680px){.shell{padding:12px}.kpi-strip{grid-template-columns:repeat(2,1fr)}.seg{width:100%;height:auto;flex-direction:column;border-radius:14px}.seg button{min-height:34px;border-right:0;border-bottom:1px solid #E1DFDD}.gauges-panel{grid-template-columns:1fr;grid-template-rows:auto auto}.month-grid{grid-template-columns:repeat(2,minmax(110px,1fr))}.chart svg{height:360px}}
</style>
</head>

function safe(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function fmt(n, mode=state.mode) {
  const x = Number(n||0);
  if (mode === 'eficiencia') return x.toLocaleString('es-CO', {maximumFractionDigits:1});
  return Math.round(x).toLocaleString('es-CO');
}
function fmtFull(n, mode=state.mode) { return mode === 'eficiencia' ? `${fmt(n,'eficiencia')} h` : fmt(n,'ejecucion'); }
function fmtRatio(r) { return (Number(r||0)*100).toLocaleString('es-CO', {minimumFractionDigits:2, maximumFractionDigits:2}) + '%'; }
function fmtCompact(n) {
  const x = Number(n||0);
  if (state.mode === 'eficiencia') {
    if (Math.abs(x) >= 1000) return (x/1000).toLocaleString('es-CO', {maximumFractionDigits:1}) + 'k h';
    return x.toLocaleString('es-CO', {maximumFractionDigits:0}) + ' h';

    ['Registros filtrados', fmt(t.total,'ejecucion'), `${fmt(t.horas,'eficiencia')} h totales`]
  ];
  document.getElementById('kpiStrip').innerHTML = items.map(([label,val,extra])=>`<div class="kpi"><div class="kpi-top"><div><b>${safe(val)}</b><span>${safe(label)}</span></div><span class="kpi-icon" data-kind="${safe(kpiIcon(label))}">${iconSvg(kpiIcon(label))}</span></div><em class="chip">${safe(extra)}</em></div>`).join('');
}
function renderDetail(rows) {
  const columns = ['empresa','grupo','central','unidad','origen','origenNorm','estado','mesNombre','fechaInicio','fechaFin','duracionHoras','tarea','observacion'];
  const head = `<thead><tr>${columns.map(c=>`<th>${safe(c)}</th>`).join('')}</tr></thead>`;
  const body = rows.slice(0,1000).map(r=>`<tr>${columns.map(c=>`<td>${safe(r[c])}</td>`).join('')}</tr>`).join('');
  document.getElementById('detailTable').innerHTML = head + `<tbody>${body}</tbody>`;
}
function render() {
  const base = baseRows();
  const rows = filteredRows();
  const t = totals(rows);
  const originCounts = countsBy(base, 'origenNorm');
  const estadoCounts = countsBy(base, 'estado');
  const mesCounts = monthCounts(base);
  const originValues = sortValues([...originCounts.keys()], ORIGIN_ORDER);
  const estadoValues = sortValues([...estadoCounts.keys()], STATE_ORDER);
  const mesValues = Array.from({length:12}, (_,i)=>String(i+1));
  const ratioTitle = state.mode === 'ejecucion' ? '% Eficacia PIM %' : '% Eficiencia PIM %';
  const ratioMax = niceGaugeMax(t.ratio, true);
  const view = state.empresa === 'CHEC' ? `CHEC · ${state.grupo === 'Todos' ? 'Consolidado' : state.grupo}` : 'ESSA · Menores';
  document.getElementById('viewTitle').textContent = view;
  document.getElementById('auditTop').textContent = `Modo: ${modeName()} · Registros vista: ${rows.length} de ${base.length}`;
  setBrandHeader();
  renderKpis(rows,t);
  document.getElementById('dashboard').innerHTML = [
    slicerHTML('Mes', mesValues, state.mes, mesCounts, 'mes'),
    slicerHTML('Origen', originValues, state.origen, originCounts, 'origen'),
    slicerHTML('Estado', estadoValues, state.estado, estadoCounts, 'estado'),
    matrixHTML(rows,'unidad','Matriz por unidad'),
    matrixHTML(rows,'central','Resumen por central'),
    originSummaryHTML(rows),
    gaugesPanelHTML(t, ratioTitle, ratioMax),
    barChartHTML(rows)
  ].join('');
  document.querySelectorAll('.slice-btn').forEach(btn => btn.addEventListener('click', onSlicer));
  renderDetail(rows);
  const byEmpresa = STATS.byEmpresa || {};
  const errTxt = (STATS.errors && STATS.errors.length) ? ` · Alertas: ${STATS.errors.length}` : '';
  document.getElementById('audit').textContent = `Registros cargados: ${STATS.totalRecords || 0} · ESSA: ${byEmpresa.ESSA || 0} · CHEC: ${byEmpresa.CHEC || 0} · Generado: ${STATS.snapshot || 'sin cargar'}${errTxt}`;
}
function onSlicer(e) {
  const kind = e.currentTarget.dataset.slicer;
  const val = e.currentTarget.dataset.value;
  const set = state[kind];
  if (val === '__ALL__') set.clear(); else set.has(val) ? set.delete(val) : set.add(val);
  render();
}
function exportCsv() {
  const rows = filteredRows();
  const cols = ['empresa','grupo','hoja','filaExcel','central','unidad','origen','origenNorm','estado','mesNombre','fechaInicio','fechaFin','duracionHoras','activo','tarea','descripcion','observacion'];
  const csv = [cols.join(';')].concat(rows.map(r => cols.map(c => `"${String(r[c] ?? '').replace(/"/g,'""')}"`).join(';'))).join('\\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `detalle_pim_${state.empresa}_${state.mode}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}
async function loadDashboardData() {
  const response = await fetch('data/datos_pim.json?ts=' + Date.now(), {cache:'no-store'});
  if (!response.ok) throw new Error('No fue posible leer data/datos_pim.json');
  const payload = await response.json();
  DATA = payload.data || [];
  STATS = payload.stats || {totalRecords:0, byEmpresa:{ESSA:0, CHEC:0}, byGrupo:{}, snapshot:'sin cargar', errors:[]};
  DATA_VERSION = payload.version || STATS.snapshot || String(Date.now());
}
async function checkForUpdates() {
  try {
    const response = await fetch('data/datos_pim.json?ts=' + Date.now(), {cache:'no-store'});
    if (!response.ok) return;
    const info = await response.json();
    if (info.version && DATA_VERSION && info.version !== DATA_VERSION) {
      document.getElementById('auditTop').textContent = 'Cambio detectado en datos_pim.json · actualizando dashboard...';
      DATA = info.data || [];
      STATS = info.stats || {totalRecords:0, byEmpresa:{ESSA:0, CHEC:0}, byGrupo:{}, snapshot:'sin cargar', errors:[]};
      DATA_VERSION = info.version || STATS.snapshot || String(Date.now());
      render();
    }
  } catch (err) {
    console.warn('No se pudo verificar actualización', err);
  }
}
async function initDashboard() {
  try {
    document.getElementById('auditTop').textContent = 'Cargando datos desde data/datos_pim.json...';
    await loadDashboardData();
    render();
    setInterval(checkForUpdates, 3000);
  } catch (err) {
    document.getElementById('auditTop').textContent = 'Error cargando datos. Revisa que exista data/datos_pim.json en GitHub.';
    document.getElementById('audit').textContent = String(err.message || err);
    console.error(err);
  }
}
document.getElementById('empresa').addEventListener('change', e => { state.empresa=e.target.value; state.origen.clear(); state.estado.clear(); state.mes.clear(); document.getElementById('grupo').style.display = state.empresa==='CHEC'?'inline-block':'none'; render(); });
document.getElementById('grupo').addEventListener('change', e => { state.grupo=e.target.value; state.origen.clear(); state.estado.clear(); state.mes.clear(); render(); });
document.querySelectorAll('[data-mode]').forEach(b => b.addEventListener('click', e => { state.mode=e.currentTarget.dataset.mode; document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('active', x===e.currentTarget)); render(); }));
document.getElementById('clear').addEventListener('click', () => { state.origen.clear(); state.estado.clear(); state.mes.clear(); render(); });
document.getElementById('export').addEventListener('click', exportCsv);
initDashboard();
</script>
</body>
</html>
